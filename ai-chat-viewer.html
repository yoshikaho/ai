<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --surface2: #f0ece6;
    --border: #ddd8d0;
    --accent: #7b5ea7;
    --accent2: #5a7fbf;
    --user-bg: #eef2fa;
    --user-border: #8aaad8;
    --ai-bg: #f0f7f2;
    --ai-border: #7bb89a;
    --thinking-bg: #f5f0fa;
    --thinking-border: #c0a8e0;
    --text: #2a2520;
    --text-dim: #5a5248;
    --text-muted: #9a948c;
    --translated-bg: #eaf3fb;
    --translated-border: #a0c4e0;
    --shadow: rgba(80,60,40,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif JP', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    box-shadow: 0 1px 4px var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  header p {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .drop-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 60px 32px;
    cursor: pointer;
    border: 2px dashed var(--border);
    margin: 32px;
    border-radius: 16px;
    background: var(--surface);
    transition: border-color 0.2s, background 0.2s;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--thinking-bg);
  }

  .drop-zone-icon { font-size: 2.8rem; opacity: 0.35; }
  .drop-zone h2 { font-size: 1.1rem; color: var(--text-dim); font-weight: 400; }
  .drop-zone p { font-size: 0.82rem; color: var(--text-muted); }

  .file-btn {
    padding: 9px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.88rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .file-btn:hover { opacity: 0.85; }
  #file-input { display: none; }

  .viewer { display: none; flex: 1; flex-direction: column; }
  .viewer.active { display: flex; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px var(--shadow);
  }

  .toolbar span {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-right: auto;
  }

  .tb-btn {
    padding: 5px 13px;
    font-family: inherit;
    font-size: 0.78rem;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    transition: all 0.15s;
  }

  .tb-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--thinking-bg); }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
  }

  .turn { display: flex; flex-direction: column; gap: 8px; }

  .label {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 4px;
  }

  .bubble {
    padding: 14px 18px;
    border-radius: 10px;
    line-height: 1.8;
    font-size: 0.91rem;
    white-space: pre-wrap;
    word-break: break-word;
    border: 1px solid transparent;
    box-shadow: 0 1px 3px var(--shadow);
  }

  .user-turn .bubble {
    background: var(--user-bg);
    border-color: var(--user-border);
    border-left: 3px solid var(--user-border);
  }

  .ai-turn .bubble {
    background: var(--ai-bg);
    border-color: var(--ai-border);
    border-left: 3px solid var(--ai-border);
  }

  .thinking-block {
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--thinking-border);
    box-shadow: 0 1px 3px var(--shadow);
  }

  .thinking-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    background: var(--thinking-bg);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .thinking-header:hover { background: #ede5f7; }

  .thinking-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    flex: 1;
    letter-spacing: 0.05em;
  }

  .toggle-icon {
    font-size: 0.65rem;
    color: var(--text-muted);
    transition: transform 0.2s;
  }

  .thinking-header.open .toggle-icon { transform: rotate(180deg); }

  .char-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
  }

  .translate-btn {
    padding: 3px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    border-radius: 4px;
    border: 1px solid var(--thinking-border);
    background: white;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
  }

  .translate-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .translate-btn:disabled { opacity: 0.4; cursor: default; }

  .thinking-body {
    display: none;
    padding: 14px 16px;
    background: #faf8fc;
    border-top: 1px solid var(--thinking-border);
  }

  .thinking-body.open { display: block; }

  .thinking-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: #7060a0;
    line-height: 1.85;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .translated-area {
    margin-top: 12px;
    padding: 12px 14px;
    background: var(--translated-bg);
    border: 1px solid var(--translated-border);
    border-radius: 8px;
  }

  .translated-label {
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    color: var(--accent2);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .translated-para {
    font-size: 0.84rem;
    color: #2a4060;
    line-height: 1.85;
    margin-bottom: 10px;
    word-break: break-word;
  }

  .translated-para:last-child { margin-bottom: 0; }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }

  .loading-dots span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    animation: dot-bounce 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.35; }
    40% { transform: scale(1); opacity: 1; }
  }

  .separator {
    height: 1px;
    background: var(--border);
    margin: 10px 0;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 0.88rem;
    line-height: 2;
  }

  .error-msg { color: #c0392b; font-size: 0.8rem; }

  .engine-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 24px;
    background: #faf8fc;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    font-size: 0.78rem;
  }

  .engine-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  .engine-btn {
    padding: 4px 12px;
    font-family: inherit;
    font-size: 0.78rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .engine-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .key-input {
    padding: 4px 10px;
    border: 1px solid var(--thinking-border);
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    width: 280px;
    background: white;
    color: var(--text);
  }

  .key-input:focus { outline: none; border-color: var(--accent); }

  .thinking-checkbox {
    width: 15px; height: 15px;
    cursor: pointer;
    accent-color: var(--accent);
    flex-shrink: 0;
  }

  .thinking-block.checked .thinking-header {
    background: #e8dff5;
  }

  .checked-count {
    font-size: 0.75rem;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    padding: 0 4px;
  }

  .tb-btn.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .tb-btn.primary:hover { opacity: 0.85; color: white; background: var(--accent); }
</style>
</head>
<body>

<header>
  <div>
    <h1>AI Chat Viewer</h1>
    <p>マークダウン形式の会話ファイルを読み込んで表示します</p>
  </div>
</header>

<div class="drop-zone" id="drop-zone">
  <div class="drop-zone-icon">📂</div>
  <h2>ファイルをここにドロップ</h2>
  <p>またはボタンでファイルを選択してください</p>
  <button class="file-btn" onclick="document.getElementById('file-input').click()">ファイルを選ぶ</button>
  <input type="file" id="file-input" accept=".md,.txt">
</div>

<div class="viewer" id="viewer">
  <div class="toolbar">
    <span id="file-name"></span>
    <button class="tb-btn" onclick="expandAll()">思考を全部開く</button>
    <button class="tb-btn" onclick="collapseAll()">思考を全部閉じる</button>
    <span class="checked-count" id="checked-count"></span>
    <button class="tb-btn primary" id="translate-checked-btn" onclick="translateChecked()" style="display:none">チェックした項目を翻訳</button>
    <span id="translate-progress" style="font-size:0.75rem; font-family:'DM Mono',monospace; color:var(--accent); display:none"></span>
    <button class="tb-btn" onclick="jumpToFirstUntranslated()">最初の未翻訳へ ↑</button>
    <button class="tb-btn" onclick="jumpToNextUntranslated()">次の未翻訳へ ↓</button>
    <button class="tb-btn" onclick="checkAllUntranslated()">未翻訳を全部チェック</button>
    <button class="tb-btn" onclick="uncheckAll()">チェックを全部外す</button>
    <button class="tb-btn" onclick="translateAll()">全部翻訳する</button>
    <button class="tb-btn" onclick="exportTranslations()">翻訳をエクスポート</button>
    <button class="tb-btn" onclick="document.getElementById('import-input').click()">翻訳をインポート</button>
    <input type="file" id="import-input" accept=".json" style="display:none">
    <button class="tb-btn" onclick="resetFile()">別のファイルを開く</button>
  </div>
  <!-- 翻訳エンジン設定バー -->
  <div class="engine-bar" id="engine-bar">
    <span class="engine-label">翻訳エンジン：</span>
    <button class="engine-btn active" id="engine-mymemory" onclick="setEngine('mymemory')">MyMemory（無料）</button>
    <button class="engine-btn" id="engine-deepl" onclick="setEngine('deepl')">DeepL</button>
    <div class="deepl-key-area" id="deepl-key-area" style="display:none">
      <input type="password" id="deepl-key-input" placeholder="DeepL APIキーを入力" class="key-input">
      <button class="tb-btn" onclick="saveDeeplKey()">保存</button>
      <span id="deepl-key-status" style="font-size:0.75rem; font-family:'DM Mono',monospace; color:var(--text-muted);"></span>
    </div>
  </div>
  <div class="chat-area" id="chat-area"></div>
</div>

<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const viewer = document.getElementById('viewer');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) readFile(e.target.files[0]);
});

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('file-name').textContent = file.name;
    parseAndRender(e.target.result);
    dropZone.style.display = 'none';
    viewer.classList.add('active');
  };
  reader.readAsText(file, 'UTF-8');
}

function resetFile() {
  dropZone.style.display = '';
  viewer.classList.remove('active');
  document.getElementById('chat-area').innerHTML = '';
  fileInput.value = '';
}

function parseMarkdown(text) {
  // 先頭が --- で始まらない場合も考慮して分割
  const normalized = text.trim().startsWith('---') ? text : '---\n' + text;
  const blocks = normalized.split(/^---$/m).map(b => b.trim()).filter(b => b.length > 0);
  const turns = [];
  for (const block of blocks) {
    const youMatch = block.match(/^#\s+you asked\s*\n([\s\S]*)/i);
    const aiMatch = block.match(/^#\s+\w[\w\s]+response\s*\n([\s\S]*)/i);
    if (youMatch) turns.push({ type: 'user', content: youMatch[1].trim() });
    else if (aiMatch) turns.push({ type: 'ai', content: aiMatch[1].trim() });
  }
  return turns;
}

function splitAiContent(content) {
  const lines = content.split('\n');
  let thinkingLines = [], bodyLines = [];
  let inThinking = false, thinkingDone = false;

  for (const line of lines) {
    if (!thinkingDone && !inThinking && line.trim() === 'Thinking') {
      inThinking = true;
      continue;
    }
    if (inThinking) {
      if (/[\u3000-\u9fff\uff00-\uffef]/.test(line) && line.trim().length > 0) {
        thinkingDone = true; inThinking = false;
        bodyLines.push(line);
      } else {
        thinkingLines.push(line);
      }
    } else {
      bodyLines.push(line);
    }
  }
  return { thinking: thinkingLines.join('\n').trim(), body: bodyLines.join('\n').trim() };
}

let blockCount = 0;

function parseAndRender(text) {
  const turns = parseMarkdown(text);
  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  blockCount = 0;

  if (turns.length === 0) {
    area.innerHTML = '<div class="empty-state">会話のターンが見つかりませんでした。<br>ファイルの形式を確認してみてください。</div>';
    return;
  }

  turns.forEach((turn, i) => {
    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'separator';
      area.appendChild(sep);
    }

    const div = document.createElement('div');
    div.className = 'turn ' + (turn.type === 'user' ? 'user-turn' : 'ai-turn');

    if (turn.type === 'user') {
      if (turn.content) {
        div.innerHTML = `<div class="label">あなた</div><div class="bubble">${escHtml(turn.content)}</div>`;
      }
    } else {
      const { thinking, body } = splitAiContent(turn.content);
      let html = `<div class="label">AI</div>`;
      if (thinking) {
        const id = 'tb-' + (blockCount++);
        html += buildThinkingBlock(id, thinking);
      }
      if (body) html += `<div class="bubble">${escHtml(body)}</div>`;
      div.innerHTML = html;
    }
    area.appendChild(div);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildThinkingBlock(id, thinking) {
  const charCount = thinking.length;
  return `
    <div class="thinking-block" id="${id}">
      <div class="thinking-header" onclick="toggleThinking('${id}')">
        <input type="checkbox" class="thinking-checkbox" id="${id}-chk"
          onclick="event.stopPropagation(); updateCheckedCount()"
          onchange="document.getElementById('${id}').classList.toggle('checked', this.checked)">
        <span class="thinking-label">Thinking</span>
        <span class="char-count">${charCount.toLocaleString()}文字</span>
        <button class="translate-btn" id="${id}-tbtn" onclick="event.stopPropagation(); translateBlock('${id}')">翻訳</button>
        <span class="toggle-icon" id="${id}-icon">▼</span>
      </div>
      <div class="thinking-body" id="${id}-body">
        <div class="thinking-text" id="${id}-text">${escHtml(thinking)}</div>
        <div id="${id}-translated" style="display:none"></div>
      </div>
    </div>`;
}

function toggleThinking(id) {
  const body = document.getElementById(id + '-body');
  const header = document.querySelector(`#${id} .thinking-header`);
  const isOpen = body.classList.toggle('open');
  header.classList.toggle('open', isOpen);
}

function expandAll() {
  document.querySelectorAll('.thinking-body').forEach(b => b.classList.add('open'));
  document.querySelectorAll('.thinking-header').forEach(h => h.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.thinking-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.thinking-header').forEach(h => h.classList.remove('open'));
}

// ---- 翻訳エンジン ----
let currentEngine = 'mymemory';

function setEngine(engine) {
  currentEngine = engine;
  document.getElementById('engine-mymemory').classList.toggle('active', engine === 'mymemory');
  document.getElementById('engine-deepl').classList.toggle('active', engine === 'deepl');
  document.getElementById('deepl-key-area').style.display = engine === 'deepl' ? '' : 'none';
  if (engine === 'deepl') {
    const saved = localStorage.getItem('deepl-api-key');
    if (saved) {
      document.getElementById('deepl-key-input').value = saved;
      document.getElementById('deepl-key-status').textContent = 'キー読み込み済み';
    }
  }
}

function saveDeeplKey() {
  const key = document.getElementById('deepl-key-input').value.trim();
  if (!key) return;
  localStorage.setItem('deepl-api-key', key);
  document.getElementById('deepl-key-status').textContent = '保存しました！';
  setTimeout(() => { document.getElementById('deepl-key-status').textContent = 'キー読み込み済み'; }, 2000);
}

async function translateText(text) {
  if (currentEngine === 'deepl') {
    return translateTextDeepL(text);
  } else {
    return translateTextMyMemory(text);
  }
}

async function translateTextMyMemory(text) {
  const CHUNK = 480;
  if (text.length <= CHUNK) {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ja`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.responseStatus === 200) return data.responseData.translatedText;
    throw new Error('翻訳失敗');
  }
  const sentences = text.match(/[^.!?\n]+[.!?\n]*/g) || [text];
  let chunks = [], current = '';
  for (const s of sentences) {
    if ((current + s).length > CHUNK && current) { chunks.push(current.trim()); current = s; }
    else current += s;
  }
  if (current.trim()) chunks.push(current.trim());
  const results = [];
  for (const chunk of chunks) {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(chunk)}&langpair=en|ja`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.responseStatus === 200) results.push(data.responseData.translatedText);
    else throw new Error('翻訳失敗');
    await new Promise(r => setTimeout(r, 150));
  }
  return results.join(' ');
}

async function translateTextDeepL(text) {
  const key = localStorage.getItem('deepl-api-key') || document.getElementById('deepl-key-input').value.trim();
  if (!key) throw new Error('DeepL APIキーが設定されていません');
  // フリープランは api-free.deepl.com、有料は api.deepl.com
  const endpoint = key.endsWith(':fx')
    ? 'https://api-free.deepl.com/v2/translate'
    : 'https://api.deepl.com/v2/translate';
  const res = await fetch(endpoint, {
    method: 'POST',
    headers: { 'Authorization': `DeepL-Auth-Key ${key}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: [text], target_lang: 'JA' })
  });
  if (!res.ok) throw new Error('DeepL翻訳失敗');
  const data = await res.json();
  return data.translations[0].text;
}

function checkAllUntranslated() {
  let count = 0;
  for (let i = 0; i < blockCount; i++) {
    const id = 'tb-' + i;
    const translated = document.getElementById(id + '-translated');
    const chk = document.getElementById(id + '-chk');
    if (!chk || !translated) continue;
    if (translated.style.display === 'none') {
      chk.checked = true;
      document.getElementById(id).classList.add('checked');
      count++;
    }
  }
  updateCheckedCount();
}

// ** 見出し ** を太字カラーに変換
function formatTranslated(text) {
  return escHtml(text).replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--accent);">$1</strong>');
}

function renderTranslated(container, paras) {
  container.innerHTML = `<div class="translated-label">日本語訳</div>`;
  paras.forEach(p => {
    const div = document.createElement('div');
    div.className = 'translated-para';
    if (/<[a-z]/.test(p)) {
      div.innerHTML = p;
    } else {
      div.innerHTML = formatTranslated(p);
    }
    container.appendChild(div);
  });
}

// 戻り値: true=成功, false=失敗
async function translateBlock(id) {
  const textEl = document.getElementById(id + '-text');
  const translatedEl = document.getElementById(id + '-translated');
  const btn = document.getElementById(id + '-tbtn');

  if (translatedEl.style.display !== 'none') {
    translatedEl.style.display = 'none';
    btn.textContent = '翻訳';
    return true;
  }

  const body = document.getElementById(id + '-body');
  const header = document.querySelector(`#${id} .thinking-header`);
  if (!body.classList.contains('open')) {
    body.classList.add('open');
    header.classList.add('open');
  }

  const original = textEl.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
  translatedEl.style.display = 'block';
  translatedEl.className = 'translated-area';
  translatedEl.innerHTML = '<div class="translated-label">翻訳中...</div>';

  try {
    const paragraphs = original.split(/\n\n+/).map(p => p.trim()).filter(p => p);
    const translated = [];
    for (const para of paragraphs) {
      const result = await translateText(para);
      translated.push(result);
      await new Promise(r => setTimeout(r, 150));
    }
    renderTranslated(translatedEl, translated);
    btn.textContent = '翻訳を隠す';
    btn.disabled = false;
    return true;
  } catch(e) {
    translatedEl.innerHTML = '<div class="translated-area"><span class="error-msg">翻訳に失敗しました。少し時間をおいて試してみてください。</span></div>';
    btn.textContent = '翻訳';
    btn.disabled = false;
    return false;
  }
}

async function translateAll() {
  for (let i = 0; i < blockCount; i++) {
    const id = 'tb-' + i;
    const translated = document.getElementById(id + '-translated');
    if (translated && translated.style.display === 'none') {
      await translateBlock(id);
      await new Promise(r => setTimeout(r, 400));
    }
  }
}

function updateCheckedCount() {
  const checkboxes = document.querySelectorAll('.thinking-checkbox');
  const checkedBoxes = [...checkboxes].filter(c => c.checked);
  const countEl = document.getElementById('checked-count');
  const btn = document.getElementById('translate-checked-btn');
  if (checkedBoxes.length > 0) {
    // チェック済みブロックの文字数合計
    let totalChars = 0;
    checkedBoxes.forEach(chk => {
      const blockId = chk.id.replace('-chk', '');
      const textEl = document.getElementById(blockId + '-text');
      if (textEl) totalChars += textEl.textContent.length;
    });
    countEl.textContent = `${checkedBoxes.length}件選択中・約${totalChars.toLocaleString()}文字`;
    btn.style.display = '';
  } else {
    countEl.textContent = '';
    btn.style.display = 'none';
  }
}

async function translateChecked() {
  const targets = [];
  for (let i = 0; i < blockCount; i++) {
    const id = 'tb-' + i;
    const chk = document.getElementById(id + '-chk');
    if (!chk || !chk.checked) continue;
    const translated = document.getElementById(id + '-translated');
    if (translated && translated.style.display === 'none') targets.push(id);
  }
  if (targets.length === 0) return;

  const btn = document.getElementById('translate-checked-btn');
  const progress = document.getElementById('translate-progress');
  btn.disabled = true;
  progress.style.display = '';

  let successCount = 0, failedNums = [];

  for (let i = 0; i < targets.length; i++) {
    progress.textContent = `翻訳中... ${i + 1} / ${targets.length}`;
    const ok = await translateBlock(targets[i]);
    if (ok) {
      // 成功したらチェックを外す
      const chk = document.getElementById(targets[i] + '-chk');
      if (chk) { chk.checked = false; document.getElementById(targets[i]).classList.remove('checked'); }
      successCount++;
    } else {
      failedNums.push(i + 1);
    }
    await new Promise(r => setTimeout(r, 400));
  }

  updateCheckedCount();

  if (failedNums.length === 0) {
    progress.style.color = 'var(--ai-border)';
    progress.textContent = `完了！ ${successCount} 件翻訳しました`;
  } else {
    progress.style.color = '#c0392b';
    progress.textContent = `${successCount} 件成功・${failedNums.length} 件失敗（${failedNums.join(', ')}番目）`;
  }
  setTimeout(() => { progress.style.display = 'none'; progress.style.color = ''; }, 5000);
  btn.disabled = false;
}

// ---- 未翻訳ジャンプ ----
let lastJumpIndex = -1;

function jumpToFirstUntranslated() {
  lastJumpIndex = -1;
  for (let i = 0; i < blockCount; i++) {
    const translated = document.getElementById('tb-' + i + '-translated');
    if (translated && translated.style.display === 'none') {
      lastJumpIndex = i;
      document.getElementById('tb-' + i).scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
  }
  showProgressMsg('未翻訳のブロックはありません', 'var(--ai-border)');
}
function jumpToNextUntranslated() {
  for (let i = lastJumpIndex + 1; i < blockCount; i++) {
    const translated = document.getElementById('tb-' + i + '-translated');
    if (translated && translated.style.display === 'none') {
      lastJumpIndex = i;
      document.getElementById('tb-' + i).scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
  }
  lastJumpIndex = -1;
  for (let i = 0; i < blockCount; i++) {
    const translated = document.getElementById('tb-' + i + '-translated');
    if (translated && translated.style.display === 'none') {
      lastJumpIndex = i;
      document.getElementById('tb-' + i).scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
  }
  showProgressMsg('未翻訳のブロックはありません', 'var(--ai-border)');
}

function uncheckAll() {
  document.querySelectorAll('.thinking-checkbox').forEach(chk => {
    chk.checked = false;
    const block = chk.closest('.thinking-block');
    if (block) block.classList.remove('checked');
  });
  updateCheckedCount();
}

function showProgressMsg(msg, color) {
  const progress = document.getElementById('translate-progress');
  progress.style.display = '';
  progress.style.color = color || 'var(--accent)';
  progress.textContent = msg;
  setTimeout(() => { progress.style.display = 'none'; progress.style.color = ''; }, 2500);
}

// ---- エクスポート ----
function exportTranslations() {
  const data = {};
  for (let i = 0; i < blockCount; i++) {
    const id = 'tb-' + i;
    const translatedEl = document.getElementById(id + '-translated');
    if (!translatedEl || translatedEl.style.display === 'none') continue;
    const paras = [...translatedEl.querySelectorAll('.translated-para')].map(p => p.innerHTML);
    if (paras.length > 0) data[id] = paras;
  }
  if (Object.keys(data).length === 0) {
    alert('まだ翻訳された内容がありません。');
    return;
  }
  const fileName = (document.getElementById('file-name').textContent || 'chat').replace(/\.[^.]+$/, '');
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fileName + '_translations.json';
  a.click();
}

// ---- インポート ----
document.getElementById('import-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      for (const [id, paras] of Object.entries(data)) {
        const translatedEl = document.getElementById(id + '-translated');
        const btn = document.getElementById(id + '-tbtn');
        if (!translatedEl || !btn) continue;
        // ボディを開く
        const body = document.getElementById(id + '-body');
        const header = document.querySelector(`#${id} .thinking-header`);
        if (body && !body.classList.contains('open')) {
          body.classList.add('open');
          if (header) header.classList.add('open');
        }
        renderTranslated(translatedEl, paras);
        translatedEl.style.display = 'block';
        translatedEl.className = 'translated-area';
        btn.textContent = '翻訳を隠す';
        count++;
      }
      alert(`${count}件の翻訳を読み込みました。`);
    } catch(err) {
      alert('JSONファイルの読み込みに失敗しました。');
    }
    e.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
});
</script>
