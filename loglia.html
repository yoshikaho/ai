<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loglia</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --sky: #e0f4ff;
  --sky2: #c2e9fb;
  --sky3: #a1d8f5;
  --blue: #4fb3e8;
  --blue2: #2196c4;
  --blue3: #1565a0;
  --accent: #ff85a1;
  --accent2: #ffb347;
  --surface: #ffffff;
  --surface2: #f0f9ff;
  --border: #c2e9fb;
  --text: #1a3a4a;
  --text-dim: #4a7a9b;
  --text-muted: #8ab4cc;
  --thinking-bg: #f5f0ff;
  --thinking-border: #c9b8f0;
  --thinking-text: #6040a0;
  --translated-bg: #e8f8ff;
  --translated-border: #90d0f0;
  --shadow: rgba(30, 100, 160, 0.10);
  --shadow2: rgba(30, 100, 160, 0.18);
  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', 'Kaisei Decol', sans-serif;
  background: linear-gradient(135deg, #e0f4ff 0%, #c2e9fb 40%, #ddf0ff 100%);
  min-height: 100vh;
  color: var(--text);
}

/* ========== BUBBLES BG ========== */
.bg-bubbles {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.bg-bubbles span {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.18);
  animation: floatUp linear infinite;
}
.bg-bubbles span:nth-child(1)  { width:60px;height:60px;left:10%;animation-duration:18s;animation-delay:0s; }
.bg-bubbles span:nth-child(2)  { width:30px;height:30px;left:25%;animation-duration:12s;animation-delay:3s; }
.bg-bubbles span:nth-child(3)  { width:80px;height:80px;left:40%;animation-duration:22s;animation-delay:1s; }
.bg-bubbles span:nth-child(4)  { width:20px;height:20px;left:60%;animation-duration:10s;animation-delay:5s; }
.bg-bubbles span:nth-child(5)  { width:50px;height:50px;left:75%;animation-duration:16s;animation-delay:2s; }
.bg-bubbles span:nth-child(6)  { width:40px;height:40px;left:88%;animation-duration:14s;animation-delay:7s; }
@keyframes floatUp {
  0%   { transform: translateY(110vh) scale(0.8); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
}

/* ========== PAGES ========== */
.page { display: none; position: relative; z-index: 1; }
.page.active { display: block; }

/* ========== LOGIN PAGE ========== */
#page-login {
  min-height: 100vh;
  display: none;
  align-items: center;
  justify-content: center;
}
#page-login.active { display: flex; }

.login-card {
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(16px);
  border: 1.5px solid rgba(255,255,255,0.7);
  border-radius: 28px;
  padding: 48px 44px 44px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 8px 40px var(--shadow2), 0 2px 8px var(--shadow);
  text-align: center;
  animation: cardIn 0.5s cubic-bezier(.22,.8,.36,1) both;
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(24px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.login-logo {
  font-family: 'Kaisei Decol', serif;
  font-size: 2.8rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--blue2), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
  letter-spacing: 0.04em;
}
.login-sub {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 32px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.08em;
}
.login-label {
  display: block;
  text-align: left;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-dim);
  margin-bottom: 6px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.login-input {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  color: var(--text);
  background: var(--surface2);
  margin-bottom: 18px;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.login-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(79,179,232,0.15);
}
.btn-primary {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 16px rgba(33,150,196,0.3);
  margin-top: 4px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(33,150,196,0.38); }
.btn-primary:active { transform: translateY(0); }
.login-toggle {
  margin-top: 18px;
  font-size: 0.85rem;
  color: var(--text-muted);
}
.login-toggle a {
  color: var(--blue2);
  text-decoration: none;
  font-weight: 700;
  cursor: pointer;
}
.login-toggle a:hover { text-decoration: underline; }
.login-error {
  background: #fff0f3;
  border: 1px solid #ffb3c1;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.83rem;
  color: #c0304a;
  margin-bottom: 16px;
  display: none;
}

/* ========== HEADER ========== */
.app-header {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  border-bottom: 1.5px solid rgba(194,233,251,0.6);
  padding: 0 28px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px var(--shadow);
}
.header-logo {
  font-family: 'Kaisei Decol', serif;
  font-size: 1.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--blue2), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.04em;
}
.header-right { display: flex; align-items: center; gap: 12px; }
.btn-ghost {
  padding: 7px 16px;
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-ghost:hover { border-color: var(--blue); color: var(--blue2); background: var(--sky); }

.btn-accent {
  padding: 7px 18px;
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  border: none;
  border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 2px 8px rgba(33,150,196,0.25);
}
.btn-accent:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(33,150,196,0.35); }

/* ========== LIST PAGE ========== */
#page-list { min-height: calc(100vh - 60px); padding: 36px 28px; max-width: 900px; margin: 0 auto; }

.page-title {
  font-family: 'Kaisei Decol', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--blue3);
  margin-bottom: 6px;
}
.page-subtitle {
  font-size: 0.83rem;
  color: var(--text-muted);
  margin-bottom: 28px;
  font-family: 'DM Mono', monospace;
}

.thread-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
  margin-top: 8px;
}

.thread-card {
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(8px);
  border: 1.5px solid rgba(194,233,251,0.7);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  box-shadow: 0 2px 12px var(--shadow);
  animation: fadeIn 0.35s ease both;
  position: relative;
  overflow: hidden;
}
.thread-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--blue), var(--accent));
  border-radius: var(--radius) var(--radius) 0 0;
}
.thread-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px var(--shadow2); border-color: var(--blue); }

.card-title {
  font-size: 0.97rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.4;
  word-break: break-word;
}
.card-date {
  font-size: 0.73rem;
  font-family: 'DM Mono', monospace;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.badge {
  font-size: 0.68rem;
  font-family: 'DM Mono', monospace;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 500;
}
.badge-md { background: var(--sky2); color: var(--blue2); border: 1px solid var(--blue); }
.badge-json { background: #fff3e0; color: #b06000; border: 1px solid #ffb347; }

.card-delete {
  position: absolute;
  top: 10px; right: 12px;
  background: transparent;
  border: none;
  font-size: 1rem;
  color: var(--text-muted);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
  transition: all 0.15s;
  opacity: 0;
}
.thread-card:hover .card-delete { opacity: 1; }
.card-delete:hover { background: #fff0f3; color: var(--accent); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.4; }
.empty-state p { font-size: 0.93rem; line-height: 1.7; }

/* ========== UPLOAD MODAL ========== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(20, 60, 100, 0.35);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }

.modal {
  background: white;
  border-radius: 24px;
  padding: 36px 32px 32px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 12px 48px rgba(20,60,100,0.2);
  animation: cardIn 0.3s cubic-bezier(.22,.8,.36,1) both;
}
.modal-title {
  font-family: 'Kaisei Decol', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--blue3);
  margin-bottom: 4px;
}
.modal-sub {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 24px;
  font-family: 'DM Mono', monospace;
}
.form-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-dim);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.form-input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Nunito', sans-serif;
  font-size: 0.92rem;
  color: var(--text);
  background: var(--surface2);
  margin-bottom: 16px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--blue); }

.drop-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
  background: var(--surface2);
}
.drop-area:hover, .drop-area.drag-over { border-color: var(--blue); background: var(--sky); }
.drop-area-icon { font-size: 1.8rem; margin-bottom: 6px; opacity: 0.5; }
.drop-area p { font-size: 0.8rem; color: var(--text-muted); }
.drop-area .file-name { font-size: 0.82rem; color: var(--blue2); font-weight: 700; margin-top: 4px; }

.modal-actions { display: flex; gap: 10px; margin-top: 8px; }
.btn-cancel {
  flex: 1;
  padding: 11px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Nunito', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-cancel:hover { border-color: var(--blue); color: var(--blue2); }
.btn-save {
  flex: 2;
  padding: 11px;
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Nunito', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 3px 12px rgba(33,150,196,0.25);
}
.btn-save:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(33,150,196,0.35); }
.btn-save:disabled { opacity: 0.5; cursor: default; transform: none; }

.upload-status {
  font-size: 0.82rem;
  text-align: center;
  margin-top: 10px;
  min-height: 20px;
  color: var(--blue2);
}

/* ========== VIEWER PAGE ========== */
#page-viewer { min-height: calc(100vh - 60px); }

.viewer-header {
  padding: 24px 28px 0;
  max-width: 860px;
  margin: 0 auto;
}
.viewer-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.83rem;
  font-weight: 700;
  color: var(--text-dim);
  cursor: pointer;
  background: rgba(255,255,255,0.7);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 6px 16px;
  transition: all 0.15s;
  margin-bottom: 16px;
}
.viewer-back:hover { border-color: var(--blue); color: var(--blue2); background: var(--sky); }
.viewer-title {
  font-family: 'Kaisei Decol', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--blue3);
  margin-bottom: 4px;
}
.viewer-date {
  font-size: 0.75rem;
  font-family: 'DM Mono', monospace;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.viewer-toolbar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 12px 28px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(194,233,251,0.5);
  max-width: 860px;
  margin: 0 auto;
}

.tb-btn {
  padding: 5px 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  border-radius: 20px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: rgba(255,255,255,0.8);
  color: var(--text-dim);
  transition: all 0.15s;
}
.tb-btn:hover { border-color: var(--blue); color: var(--blue2); background: var(--sky); }

.chat-area {
  padding: 24px 28px 48px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 860px;
  margin: 0 auto;
}

.turn { display: flex; flex-direction: column; gap: 6px; }

.turn-label {
  font-size: 0.68rem;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 0 4px;
}

.bubble {
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  line-height: 1.85;
  font-size: 0.91rem;
  word-break: break-word;
  box-shadow: 0 2px 8px var(--shadow);
}
.user-turn .bubble {
  background: rgba(255,255,255,0.85);
  border: 1.5px solid var(--sky3);
  border-left: 3px solid var(--blue);
}
.ai-turn .bubble {
  background: rgba(224,244,255,0.7);
  border: 1.5px solid var(--sky2);
  border-left: 3px solid var(--sky3);
}

/* Thinking blocks */
.thinking-outer { margin-bottom: 2px; }
.thinking-block {
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1.5px solid var(--thinking-border);
  box-shadow: 0 1px 6px var(--shadow);
}
.thinking-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  background: var(--thinking-bg);
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.thinking-header:hover { background: #ede5f7; }
.thinking-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--thinking-text);
  flex: 1;
  letter-spacing: 0.05em;
}
.toggle-icon {
  font-size: 0.65rem;
  color: var(--text-muted);
  transition: transform 0.2s;
}
.thinking-header.open .toggle-icon { transform: rotate(180deg); }
.char-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-muted);
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--thinking-border);
  border-radius: 4px;
  padding: 1px 6px;
}
.thinking-checkbox { accent-color: var(--blue2); cursor: pointer; }
.thinking-body {
  display: none;
  padding: 14px 16px;
  background: rgba(250,248,255,0.95);
  border-top: 1px solid var(--thinking-border);
}
.thinking-body.open { display: block; }
.thinking-text {
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  color: var(--thinking-text);
  line-height: 1.85;
  word-break: break-word;
  white-space: pre-wrap;
}

/* Translation */
.translated-area {
  margin-top: 12px;
  padding: 12px 14px;
  background: var(--translated-bg);
  border: 1.5px solid var(--translated-border);
  border-radius: 8px;
}
.translated-label {
  font-size: 0.65rem;
  font-family: 'DM Mono', monospace;
  color: var(--blue2);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.translated-para {
  font-size: 0.84rem;
  color: #1a3a5a;
  line-height: 1.85;
  margin-bottom: 10px;
  word-break: break-word;
}
.translated-para:last-child { margin-bottom: 0; }

.translate-btn {
  padding: 3px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  border-radius: 4px;
  border: 1px solid var(--thinking-border);
  background: white;
  color: var(--thinking-text);
  cursor: pointer;
  transition: all 0.15s;
}
.translate-btn:hover { background: var(--thinking-text); border-color: var(--thinking-text); color: white; }
.translate-btn:disabled { opacity: 0.4; cursor: default; }

/* Loading */
.loading-dots { display: inline-flex; gap: 4px; align-items: center; }
.loading-dots span {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--blue);
  animation: dotPulse 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%,80%,100% { transform: scale(0.7); opacity: 0.4; }
  40% { transform: scale(1.1); opacity: 1; }
}

/* Summary bar */
.summary-bar {
  display: none;
  padding: 8px 28px;
  background: rgba(255,255,255,0.6);
  border-top: 1px solid rgba(194,233,251,0.5);
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 10px;
  max-width: 860px;
  margin: 0 auto;
}
.progress-track {
  flex: 1; height: 5px;
  background: var(--border); border-radius: 4px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--accent));
  border-radius: 4px;
  transition: width 0.4s;
  width: 0%;
}

/* Loading screen */
.loading-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-size: 0.9rem;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}

/* Scroll */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--sky3); border-radius: 4px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 28px; right: 28px;
  background: var(--blue3);
  color: white;
  padding: 12px 20px;
  border-radius: 12px;
  font-size: 0.85rem;
  font-weight: 700;
  z-index: 999;
  box-shadow: 0 4px 20px rgba(20,60,100,0.25);
  transform: translateY(60px);
  opacity: 0;

  btn.disabled = true;
  status.textContent = '保存中...';
  let mdContent = null, jsonContent = null;
  try {
    if (mdFile) mdContent = await readFileText(mdFile);
    if (jsonFile) jsonContent = await readFileText(jsonFile);
  } catch(e) { status.textContent = 'ファイル読み込みに失敗しました'; btn.disabled = false; return; }
  const payload = {

    const r = new FileReader();
    r.onload = e => res(e.target.result);

    r.readAsText(file, 'UTF-8');
  });
}

function buildThinkingBlock(id, text, savedTranslation) {
  const outer = document.createElement('div');
  outer.className = 'thinking-outer';
  outer.id = id;
  const charCount = text.length;
  const hasTranslation = savedTranslation && savedTranslation.length > 0;
  outer.innerHTML = `
    <div class="thinking-block">
      <div class="thinking-header" onclick="toggleThinking('${id}')">

// ========== MD PARSER ==========
function parseMD(text) {
  const turns = [];
  // Gemini MD format: ## User / ## AI (or similar headers)
  // Try to detect format
  const lines = text.split('\n');
  let currentRole = null;
  let currentThinking = null;
  let currentContent = [];
  let inThinking = false;
  let thinkingLines = [];
  const flushTurn = () => {
    if (currentRole) {
      turns.push({
        role: currentRole,
        thinking: currentThinking,
        content: currentContent.join('\n').trim()
      });
    }
  };
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    // Detect role headers
    if (/^##\s*(user|human|あなた|ユーザー)/i.test(line)) {
      flushTurn(); currentRole = 'user'; currentThinking = null; currentContent = []; inThinking = false; continue;
    }
    if (/^##\s*(ai|assistant|gemini|claude|model|bot)/i.test(line)) {
      flushTurn(); currentRole = 'ai'; currentThinking = null; currentContent = []; inThinking = false; continue;
    }
    // Thinking block detection (```thinking or <thinking>)
    if (!inThinking && /^```thinking/i.test(line)) { inThinking = true; thinkingLines = []; continue; }
    if (inThinking && /^```$/.test(line)) {
      inThinking = false; currentThinking = thinkingLines.join('\n'); continue;
    }
    if (!inThinking && /^<thinking>/i.test(line)) { inThinking = true; thinkingLines = []; continue; }
    if (inThinking && /^<\/thinking>/i.test(line)) {
      inThinking = false; currentThinking = thinkingLines.join('\n'); continue;
    }
    if (inThinking) { thinkingLines.push(line); continue; }
    if (currentRole) currentContent.push(line);
  }
  flushTurn();
  // If no turns found, treat whole text as single AI message
  if (turns.length === 0 && text.trim()) {
    turns.push({ role: 'ai', thinking: null, content: text.trim() });
  }
  return turns;
}

function formatText(text) {
  return escHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:rgba(100,180,230,0.15);padding:1px 5px;border-radius:3px;font-family:\'DM Mono\',monospace;font-size:0.88em;">$1</code>')
    .replace(/\n/g, '<br>');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function translateBlock(id) {
  const textEl = document.getElementById(id + '-text');
  const translatedEl = document.getElementById(id + '-translated');
  const btn = document.getElementById(id + '-tbtn');
  if (!textEl || !translatedEl) return true;
  if (translatedEl.style.display !== 'none') {
    translatedEl.style.display = 'none';
    btn.textContent = '翻訳を表示';
    return true;
  }
  const body = document.getElementById(id + '-body');
  const header = document.querySelector('#' + id + ' .thinking-header');
  if (!body.classList.contains('open')) { body.classList.add('open'); header.classList.add('open'); }
  let original = textEl.innerText;
  if (!/\n\n/.test(original)) original = original.replace(/\n/g, '\n\n');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
  translatedEl.style.display = 'block';
  translatedEl.innerHTML = '<div class="translated-label">翻訳中...</div>';
  try {
    const paragraphs = original.split(/\n\n+/).map(p => p.trim()).filter(p => p);
    const translated = [];
    for (const para of paragraphs) {
      const result = await translateText(para);
      translated.push(result);
      await new Promise(r => setTimeout(r, 150));
    }
    translatedEl.innerHTML = renderTranslatedHTML(translated);
    btn.textContent = '翻訳を隠す';
    btn.disabled = false;
    updateSummary();
    return true;
  } catch(e) {
    translatedEl.innerHTML = '<div class="translated-label" style="color:#c0304a">翻訳に失敗しました</div>';
    btn.textContent = '翻訳';
    btn.disabled = false;
    updateSummary();
    return false;
  }
}

async function translateChecked() {
  const targets = [];
  for (let i = 0; i < blockCount; i++) {
    const id = 'tb-' + i;
    const chk = document.getElementById(id + '-chk');
    if (!chk || !chk.checked) continue;
    const el = document.getElementById(id + '-translated');
    if (el && el.style.display === 'none') targets.push(id);
  }
  if (!targets.length) return;
  const btn = document.getElementById('translate-checked-btn');
  const progress = document.getElementById('translate-progress');
  btn.disabled = true;
  progress.style.display = '';
  let success = 0;
  for (let i = 0; i < targets.length; i++) {
    progress.textContent = `翻訳中 ${i+1}/${targets.length}`;
    const ok = await translateBlock(targets[i]);
    if (ok) { success++; const chk = document.getElementById(targets[i] + '-chk'); if (chk) chk.checked = false; }
    await new Promise(r => setTimeout(r, 400));
  }
  updateCheckedCount();
  progress.textContent = `完了！ ${success}件翻訳しました`;
  setTimeout(() => { progress.style.display = 'none'; }, 3000);
  btn.disabled = false;
}

async function translateText(text) {
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ja`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.responseStatus === 200) return data.responseData.translatedText;
  throw new Error('translation failed');
}

function updateSummary() {
  let done = 0, pending = 0;
  for (let i = 0; i < blockCount; i++) {
    const el = document.getElementById('tb-' + i + '-translated');
    if (!el) continue;
    if (el.style.display === 'none') pending++;
    else done++;
  }
  const total = done + pending;
  document.getElementById('summary-done').textContent = done;
  document.getElementById('summary-total').textContent = total;
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('summary-progress-bar').style.width = pct + '%';
  document.getElementById('summary-pct').textContent = pct + '%';
}

// ========== TOAST ==========
function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ========== START ==========
init();
</script>
